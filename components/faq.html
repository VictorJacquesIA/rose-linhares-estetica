<!-- Este arquivo serve como referência isolada do acordeão FAQ -->

<section id="faq" class="faq-section">
  <div class="container">
    <div class="section-header reveal">
      <h2 class="section-heading text-center">
        Dúvidas <em class="serif-accent">Frequentes</em>
      </h2>
      <p class="section-subheading text-center">
        As principais respostas sobre os atendimentos e protocolos da clínica.
      </p>
    </div>

    <div class="faq-accordion" role="list">

      <div class="faq-item" role="listitem">
        <button class="faq-item__header" onclick="window.toggleFaq(this)" aria-expanded="false">
          <span class="faq-item__question">Onde fica localizada a clínica?</span>
          <svg class="faq-item__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <div class="faq-item__body">
          <p class="faq-item__answer">O estúdio fica em São José – SC, e atende clientes de toda a Grande Florianópolis. Entre em contato pelo WhatsApp para obter o endereço exato e confirmar disponibilidade.</p>
        </div>
      </div>

    </div>
  </div>
</section>
